{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <a href="{{ url_for('main.manage_feedback') }}" class="btn btn-link text-decoration-none text-muted mb-3 p-0">
                <i class="bi bi-arrow-left me-1"></i> Back to Hub
            </a>

            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="p-4 bg-primary text-white">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <span class="badge bg-white text-primary rounded-pill mb-2 px-3">{{ feedback.category }}</span>
                            <h2 class="fw-bold mb-0">{{ feedback.subject }}</h2>
                        </div>
                        <div class="text-end">
                            <small class="d-block opacity-75">Submitted On</small>
                            <span class="fw-bold">{{ feedback.date_posted.strftime('%d %b %Y') }}</span>
                        </div>
                    </div>
                </div>

                <div class="card-body p-4 p-lg-5">
                    <label class="small fw-bold text-uppercase text-muted mb-2 d-block">Resident Message</label>
                    <div class="bg-light rounded-4 p-4 mb-4" style="white-space: pre-wrap; min-height: 150px;">
                        {{ feedback.message }}
                    </div>

                    <div class="d-flex align-items-center justify-content-between pt-3 border-top">
                        <div class="d-flex align-items-center">
                            <div class="bg-secondary bg-opacity-10 rounded-circle p-2 me-3">
                                <i class="bi bi-person-circle fs-3 text-secondary"></i>
                            </div>
                            <div>
                                <h6 class="mb-0 fw-bold">{{ feedback.author.username }}</h6>
                                <small class="text-muted">{{ feedback.author.email }}</small>
                            </div>
                        </div>
                        
                        <div class="btn-group">
                            <a href="mailto:{{ feedback.author.email }}" class="btn btn-outline-primary rounded-pill px-4">
                                <i class="bi bi-envelope me-2"></i>Contact Resident
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
